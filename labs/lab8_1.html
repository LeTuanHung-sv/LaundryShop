<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider</title>
    <style>
      img {
        vertical-align: middle;
      }
      .slideshow-container {
        max-width: 1000px;
        position: relative;
        margin: auto;
      }

      .prev,
      .next {
        cursor: pointer;
        position: absolute;
        top: 50%;
        width: auto;
        padding: 16px;
        margin-top: -22px;
        color: white;
        font-weight: bold;
        font-size: 18px;
        transition: 0.6s ease;
        border-radius: 0 3px 3px 0;
        user-select: none;
        background-color: red;
      }
      .next {
        right: 0;
        border-radius: 3px 0 0 3px;
      }

      .prev:hover,
      .next:hover {
        background-color: rgb(0, 0, 0, 0.8);
      }

      .text {
        color: #f2f2f2;
        font-size: 15px;
        padding: 8px 12px;
        position: absolute;
        bottom: 8px;
        width: 100%;
        text-align: center;
      }
      .dot {
        display: inline-block;
        border-radius: 100%;
        width: 20px;
        height: 20px;
        background-color: #999;
        cursor: pointer;
      }
      .dot:hover {
        background-color: #555;
      }
      .dot.active {
        background-color: #555;
      }
    </style>
  </head>
  <body data-new-gr-c-s-check-loaded="14.1297.0" data-gr-ext-installed="">
    <div class="slideshow-container">
      <div class="mySlides fade" style="display: block;">
        <img src="./lab8_1_files/slide_1.jpeg" style="width: 100%">
      </div>
      <div class="mySlides fade" style="display: none;">
        <img src="./lab8_1_files/slide_2.jpg" style="width: 100%">
      </div>
      <div class="mySlides fade" style="display: none;">
        <img src="./lab8_1_files/slide_3.jpg" style="width: 100%">
      </div>
      <div class="mySlides fade" style="display: none;">
        <img src="./lab8_1_files/slide_4.jpg" style="width: 100%">
      </div>
      <div class="mySlides fade" style="display: none;">
        <img src="./lab8_1_files/slide_5.jpg" style="width: 100%">
      </div>

      <a class="prev" onclick="plusSlides(-1)">&lt;</a>
      <a class="next" onclick="plusSlides(1)">&gt;</a>
    </div>
    <br>
    <div style="text-align: center">
      <span class="dot active" onclick="currentSlide(1)"></span>
      <span class="dot" onclick="currentSlide(2)"></span>
      <span class="dot" onclick="currentSlide(3)"></span>
      <span class="dot" onclick="currentSlide(4)"></span>
      <span class="dot" onclick="currentSlide(5)"></span>
    </div>

    <script>
      let slideIndex = 1;
      showSlides(slideIndex);

      function plusSlides(n) {
        showSlides((slideIndex += n));
      }

      function currentSlide(n) {
        showSlides((slideIndex = n));
      }

      function showSlides(n) {
        let i;
        let slides = document.getElementsByClassName('mySlides');
        let dots = document.getElementsByClassName('dot');
        if (n > slides.length) slideIndex = 1;
        if (n < 1) slideIndex = slides.length;
        for (i = 0; i < slides.length; i++) {
          slides[i].style.display = 'none';
        }
        for (i = 0; i < dots.length; i++) {
          dots[i].className = dots[i].className.replace(' active', '');
        }
        slides[slideIndex - 1].style.display = 'block';
        dots[slideIndex - 1].className += ' active';
      }
    </script>
